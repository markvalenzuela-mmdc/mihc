services:
  postgres:
    image: postgres:16.6
    container_name: mihc-postgres-local
    restart: unless-stopped
    command: ["postgres", "-c", "password_encryption=md5", "-c", "listen_addresses=*"]
    environment:
      POSTGRES_USER: mihc
      POSTGRES_PASSWORD: mihc
      POSTGRES_DB: mihc_app
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - mihc_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mihc -d mihc_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.0-p1
    container_name: mihc-pgbouncer-local
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mihc
      DB_PASSWORD: mihc
      DB_NAME: mihc_app
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U mihc -d mihc_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.1-alpine
    container_name: mihc-redis-local
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - mihc_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:v1.9.0
    container_name: mihc-inngest-local
    restart: unless-stopped
    command: ["inngest", "start"]
    environment:
      INNGEST_EVENT_KEY: local-event-key
      INNGEST_SIGNING_KEY: 0123456789abcdef0123456789abcdef
      INNGEST_POSTGRES_URI: postgresql://mihc:mihc@postgres:5432/mihc_app
      INNGEST_REDIS_URI: redis://redis:6379
    ports:
      - "8288:8288"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: mihc-pgadmin-local
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  mihc_postgres_data:
  mihc_redis_data: