services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-app}
      DB_NAME: ${POSTGRES_DB:-platform}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    depends_on:
      - postgres
    ports:
      - "6432:5432"

  inngest:
    image: inngest/inngest:latest
    command: ["inngest", "start"]
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local-event-key}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local-signing-key}
    ports:
      - "8288:8288"

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      - postgres
    ports:
      - "5050:80"

volumes:
  postgres_data: